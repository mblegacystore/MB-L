<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin – MB LEGACY STORE</title>
    <link rel="stylesheet" href="../css/gaya-utama.css">
</head>
<body>

<div class="title-frame">
    <h1>DASHBOARD ADMIN</h1>
    <p class="subtitle">Kawalan Penuh Platform</p>
</div>

<hr class="gold-divider">

<div class="lang-selector">
    <button id="lang-ms" onclick="switchLanguage('ms')">🇲🇾 MS</button>
    <button id="lang-en" onclick="switchLanguage('en')">🇬🇧 EN</button>
    <button id="lang-id" onclick="switchLanguage('id')">🇮🇩 ID</button>
    <button id="lang-zh" onclick="switchLanguage('zh')">🇨🇳 中文</button>
    <button id="lang-ar" onclick="switchLanguage('ar')">🇸🇦 AR</button>
</div>

<div class="treasury-section">
    <div class="product-card">
        <p class="product-name">Pengguna</p>
        <p class="product-desc">Urus akaun pembeli & penjual.</p>
    </div>
    <div class="product-card">
        <p class="product-name">Aduan</p>
        <p class="product-desc">Selesaikan pertikaian pelanggan.</p>
    </div>
    <div class="product-card">
        <p class="product-name">Laporan</p>
        <p class="product-desc">Prestasi dan statistik platform.</p>
    </div>
</div>

<footer>© 2026 MB LEGACY STORE – Admin</footer>

<script src="../fungsi/bahasa.js"></script>
<script>
    const saved = localStorage.getItem('mb-legacy-lang') || 'en';
    switchLanguage(saved);
</script>
</body>
</html>
